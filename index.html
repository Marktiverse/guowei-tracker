        </div>

        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> 今日工作看板

      <button onclick="switchTab('tab-filter')" id="btn-tab-filter" class="tab-btn py-4 px-6 text-sm font-medium border-b-2 border-transparent hover:text-blue-600 hover:border-gray-300 transition-all flex items-center gap-2">

    // --- 2. 基礎核心常數設定 ---
    const rows = rawCSV.trim().split('\n').slice(1);

      const cols = row.split(',');
      return { id: cols[0], name: cols[1], age: cols[2], left: cols[3], right: cols[4], date: cols[5], store: cols[6] };
    }).filter(c => c.id);
    allCustomers.sort((a, b) => new Date(a.date) - new Date(b.date));

    let customers = [...allCustomers]; 

    const BASIC_STATES = [
      { key: 'contacted', label: '已聯繫', icon: 'phone' },
      { key: 'scheduled', label: '已約進店', icon: 'calendar-check' },

    let currentPage = 1;
    const ITEMS_PER_PAGE = 10;
    let totalPages = Math.ceil(customers.length / ITEMS_PER_PAGE);
    let savedState = {};
    let activeTab = 'tab-work';

    // --- 3. Firebase 即時串接與即時渲染 ---
    onSnapshot(dashboardDocRef, (docSnap) => {
      if (docSnap.exists()) {
        savedState = docSnap.data().states || {};
      } else {
        savedState = {};
      }
      document.getElementById('cloud-status-dot').className = "w-2 h-2 bg-green-500 rounded-full";
      document.getElementById('cloud-status-text').innerText = "已與雲端同步";

      applyFilters(); 
    }, (error) => {
      console.error("讀取雲端失敗:", error);
    });

    function renderPage() {
      totalPages = Math.ceil(customers.length / ITEMS_PER_PAGE);
      if(currentPage > totalPages && totalPages > 0) currentPage = totalPages;
      if(currentPage < 1) currentPage = 1;

      // 更新分頁文字資訊與下拉式選單
      document.getElementById('total-pages').textContent = totalPages === 0 ? 1 : totalPages;
      document.getElementById('total-records').textContent = customers.length;

      const pageSelect = document.getElementById('page-select');
      pageSelect.innerHTML = '';
      const selectPages = totalPages === 0 ? 1 : totalPages;
      for (let i = 1; i <= selectPages; i++) {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = i;
        if (i === currentPage) opt.selected = true;
        pageSelect.appendChild(opt);
      }

      const start = (currentPage - 1) * ITEMS_PER_PAGE;
      const end = start + ITEMS_PER_PAGE;
      const currentList = customers.slice(start, end);
      
      const listContainer = document.getElementById('customer-list');
      listContainer.innerHTML = '';

      if (currentList.length === 0) {
        listContainer.innerHTML = `<div class="p-8 text-center text-gray-400 text-sm">沒有符合當前篩選條件的舊客資料。</div>`;
        return;
      }

      currentList.forEach(c => {

        // 優化改版：聽損條件後方補上 (交貨: 202X-XX-XX) 資訊

    // --- 4. 督導高級密鑰：交叉篩選器引擎 ---
    window.applyFilters = function() {
      const oppFilter = document.getElementById('filter-opp').value;
      const hearingFilter = document.getElementById('filter-hearing').value;
      const yearsFilter = document.getElementById('filter-years').value;
      const contactStatusFilter = document.getElementById('filter-contact-status').value;
      const auditionFilter = document.getElementById('filter-audition').value;
      const closedFilter = document.getElementById('filter-closed').value;

      const nonSevere = ["正常", "輕度", "輕症", "無", ""];

      customers = allCustomers.filter(c => {
        const s = savedState[c.id] || {};
        
        if (oppFilter && s.opportunityLevel !== oppFilter) return false;
        
        if (hearingFilter === 'both-mid-high') {
          const leftLoss = c.left || "";
          const rightLoss = c.right || "";
          if (nonSevere.includes(leftLoss) || nonSevere.includes(rightLoss)) return false;
        }
        
        if (yearsFilter === '3') {
          const serviceYear = new Date(c.date).getFullYear();
          if (serviceYear > 2023) return false;
        }
        
        if (contactStatusFilter && s.contactResult !== contactStatusFilter) return false;
        
        if (auditionFilter !== "") {
          const matchAudition = auditionFilter === "true";
          if (!!s.auditioned !== matchAudition) return false;
        }

        if (closedFilter !== "") {
          const matchClosed = closedFilter === "true";
          if (!!s.closed !== matchClosed) return false;
        }

        return true;
      });

      renderPage();
      updateStats();
      calculateWeeklyGoal();
    };

    window.resetFilters = function() {
      document.getElementById('filter-opp').value = "";
      document.getElementById('filter-hearing').value = "";
      document.getElementById('filter-years').value = "";
      document.getElementById('filter-contact-status').value = "";
      document.getElementById('filter-audition').value = "";
      document.getElementById('filter-closed').value = "";
      applyFilters();
    };

    // --- 5. Firebase 資料推送儲存與防呆連動 ---
    async function pushDataToFirebase() {

      document.getElementById('cloud-status-text').innerText = "正在同步變更...";
      try {
        await setDoc(dashboardDocRef, { states: savedState, lastUpdated: new Date() }, { merge: true });
      } catch (error) {
        console.error("Firebase 同步失敗:", error);
      }
    }

    window.toggleState = function(id, key) {
      if (!savedState[id]) savedState[id] = {};
      
      // 當點選基本狀態的「已聯繫」按鈕
      if (key === 'contacted') {
        // 如果是要取消打勾，則連帶把聯繫結果與日期清空
        if (savedState[id].contacted) {
          savedState[id].contacted = false;
          savedState[id].contactResult = '';
        } else {
          // 如果是手動打勾，且沒填過日期，補上當日日期
          savedState[id].contacted = true;
          if (!savedState[id].contactDate) {
            savedState[id].contactDate = new Date().toISOString().slice(0, 10);
          }
        }
      } else {
        // 其他非聯繫的按鈕一般切換
        savedState[id][key] = !savedState[id][key];
      }
      
      // 防呆：如果觸發已試聽或已成交，確保基本聯繫欄位有預填
      if (savedState[id][key] && (key === 'auditioned' || key === 'closed')) {
        if (!savedState[id].contactDate) {
          savedState[id].contactDate = new Date().toISOString().slice(0, 10);
        }
      }
      pushDataToFirebase();
      applyFilters();
    };

    window.updateContactDate = function(id, dateString) {
      if (!savedState[id]) savedState[id] = {};
      savedState[id].contactDate = dateString;
      
      // 只有當「日期」與「結果結果」兩者皆備，在核心中 contacted 才算真成立（優化改版進度閉環）
      if (dateString && savedState[id].contactResult) {
        savedState[id].contacted = true;
      } else if (!dateString) {
        savedState[id].contacted = false;
      }
      pushDataToFirebase();
      applyFilters();
    };

    window.updateContactResult = function(id, resString) {
      if (!savedState[id]) savedState[id] = {};
      savedState[id].contactResult = resString;
      
      if (resString) {
        // 優化改版：有了聯繫結果，且確保有日期，進度條才承認已聯繫
        if (!savedState[id].contactDate) {
          savedState[id].contactDate = new Date().toISOString().slice(0, 10);
        }
        savedState[id].contacted = true;
      } else {
        // 清除結果則不算聯繫完成
        savedState[id].contacted = false;
      }
      
      if (resString === "1_已預約") savedState[id].scheduled = true;

      if (resString === "5_已往生") {
        savedState[id].scheduled = false;
        savedState[id].visited = false;
        savedState[id].tested = false;
        savedState[id].auditioned = false;
        savedState[id].closed = false;
        savedState[id].nextAppointmentDate = '';
        savedState[id].appointmentStore = '';
        savedState[id].opportunityLevel = '';
      }

      pushDataToFirebase();
      applyFilters();
    };

    window.updateAppointmentDate = function(id, dateString) {
      if (!savedState[id]) savedState[id] = {};
      savedState[id].nextAppointmentDate = dateString;
      if (dateString) {
        savedState[id].scheduled = true;
        savedState[id].contactResult = "1_已預約"; 
        if (!savedState[id].contactDate) {
          savedState[id].contactDate = new Date().toISOString().slice(0, 10);
        }
        savedState[id].contacted = true;
      }
      pushDataToFirebase();
      applyFilters();
    };

    window.updateAppointmentStore = function(id, storeString) {
      if (!savedState[id]) savedState[id] = {};
      savedState[id].appointmentStore = storeString;
      pushDataToFirebase();
      applyFilters();
    };

    window.setOpportunity = function(id, level) {
      if (!savedState[id]) savedState[id] = {};
      savedState[id].opportunityLevel = (savedState[id].opportunityLevel === level) ? '' : level;
      pushDataToFirebase();
      applyFilters();
    };

    // --- 6. 頂部看板總和統計指標發動 ---
    function updateStats() {
      const counts = { contacted: 0, scheduled: 0, visited: 0, tested: 0, auditioned: 0, closed: 0 };
      Object.values(savedState).forEach(state => {
        // 優化改版：頂部計數器落實閉環，必須 contacted 且有具體追蹤結果才算數
        if (state.contacted && state.contactResult) counts.contacted++;
        if (state.scheduled) counts.scheduled++;
        if (state.visited) counts.visited++;
        if (state.tested) counts.tested++;
        if (state.auditioned) counts.auditioned++;
        if (state.closed) counts.closed++;
      });
      
      BASIC_STATES.forEach(s => { document.getElementById(`stat-${s.key}`).textContent = counts[s.key]; });
      document.getElementById('stat-auditioned').textContent = counts.auditioned;
      document.getElementById('stat-closed').textContent = counts.closed;
    }

    function calculateWeeklyGoal() {
      const now = new Date();
      const currentDay = now.getDay(); 
      const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
      const monday = new Date(now);
      monday.setDate(now.getDate() + distanceToMonday); monday.setHours(0,0,0,0);
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);

      let weeklyCount = 0;
      Object.values(savedState).forEach(state => {
        // 優化改版：只有當此筆名單確實有 contactDate 且有填寫聯繫結果（即真閉環），才納入每週進度計算
        if (state.contactDate && state.contactResult && state.contacted) {
          const cDate = new Date(state.contactDate);
          if (cDate >= monday && cDate <= sunday) weeklyCount++;
        }
      });
      const target = 7;
      const percent = Math.min(Math.round((weeklyCount / target) * 100), 100);
      document.getElementById('weekly-count').textContent = weeklyCount;
      document.getElementById('weekly-percent').textContent = `達成率: ${percent}%`;
      document.getElementById('weekly-progress-bar').style.width = `${percent}%`;
    }

    // --- 7. UI 動態切換與分頁跳轉功能 ---
    window.switchTab = function(tabId) {
      activeTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
      
      document.getElementById(`btn-${tabId}`).classList.add('active');
      document.getElementById(`content-${tabId}`).classList.remove('hidden');
    };

    window.changePage = function(delta) {
      currentPage += delta;
      renderPage();
    };

    window.jumpToPage = function(pageTarget) {
      currentPage = parseInt(pageTarget, 10);
      renderPage();
    };

    window.exportData = function() {
      let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
      csvContent += "會員編號,姓名,服務日期,左耳聽損,右耳聽損,已聯繫,聯繫日期,聯繫後狀態分類,已約進店,已進店,完成REM,已試聽,已成交,下次預約日期,預約門市,復購商機\n";
      
      allCustomers.forEach(c => {
        const s = savedState[c.id] || {};
        csvContent += `${c.id},${c.name},${c.date},${c.left||''},${c.right||''},${(s.contacted && s.contactResult)?'V':''},${s.contactDate||''},${s.contactResult||''},${s.scheduled?'V':''},${s.visited?'V':''},${s.tested?'V':''},${s.auditioned?'V':''},${s.closed?'V':''},${s.nextAppointmentDate||''},${s.appointmentStore||''},${s.opportunityLevel||'無'}\n`;
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `舊客閉環新分類管理進度_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    window.init = function() {
      applyFilters();
    };

    init();
  </script>
</body>
</html>
